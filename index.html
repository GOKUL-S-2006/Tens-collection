<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Ten's Collection — Fine Fashion Jewellery</title>
<meta name="theme-color" content="#9c2f52">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ============ TOP BAR ============ -->
  <div class="topbar">
    <div class="brand">Ten's <span class="dot">✦</span> Collection</div>
    <div class="spacer"></div>
    <button class="icon-btn" id="cartIconBtn" title="Cart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="badge hidden" id="cartBadge">0</span>
    </button>
  </div>

  <!-- ============ HOME VIEW ============ -->
  <div id="view-home">
    <div class="searchwrap">
      <div class="searchbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search rings, chains, earrings...">
      </div>
    </div>

    <div class="chips" id="categoryChips">
      <button class="chip active" data-cat="all">All</button>
      <button class="chip" data-cat="Rings">Rings</button>
      <button class="chip" data-cat="Chains">Chains</button>
      <button class="chip" data-cat="Earrings">Earrings</button>
      <button class="chip" data-cat="Bracelets">Bracelets</button>
      <button class="chip" data-cat="Anklets">Anklets</button>
      <button class="chip" data-cat="Other">Other</button>
    </div>

    <div class="hero">
      <div class="eyebrow">New Arrivals</div>
      <h1>Little pieces, big sparkle.</h1>
      <p>Handpicked rings, chains &amp; accessories from independent sellers you'll love.</p>
      <div class="hero-divider"><span class="line"></span><span class="gem">◆</span><span class="line"></span></div>
    </div>

    <div class="section-head">
      <h2>Just for you</h2>
      <span class="sub" id="productCount"></span>
    </div>

    <div class="grid" id="productGrid">
      <!-- product cards injected here -->
    </div>
    <div id="homeEmptyState"></div>
  </div>

  <!-- ============ CART VIEW ============ -->
  <div id="view-cart" class="hidden">
    <div class="topbar" style="position:static;">
      <button class="icon-btn" id="cartBackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 style="font-size:17px;">My Cart</h2>
    </div>
    <div class="view-pad" id="cartContent"></div>
  </div>

  <!-- ============ CHECKOUT VIEW ============ -->
  <div id="view-checkout" class="hidden">
    <div class="topbar" style="position:static;">
      <button class="icon-btn" id="checkoutBackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 style="font-size:17px;">Pay with GPay</h2>
    </div>
    <div class="view-pad" id="checkoutContent"></div>
  </div>

  <!-- ============ SELL VIEW ============ -->
  <div id="view-sell" class="hidden">
    <div class="topbar" style="position:static;">
      <h2 style="font-size:17px;">Sell on Ten Collection</h2>
    </div>
    <div class="view-pad" id="sellContent"></div>
  </div>

  <!-- ============ ACCOUNT VIEW ============ -->
  <div id="view-account" class="hidden">
    <div class="topbar" style="position:static;">
      <h2 style="font-size:17px;">Account</h2>
    </div>
    <div id="accountContent"></div>
  </div>

  <!-- ============ MY ORDERS VIEW ============ -->
  <div id="view-orders" class="hidden">
    <div class="topbar" style="position:static;">
      <button class="icon-btn" id="ordersBackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 style="font-size:17px;">My Orders</h2>
    </div>
    <div class="view-pad" id="ordersContent"></div>
  </div>

  <!-- ============ MY LISTINGS VIEW ============ -->
  <div id="view-listings" class="hidden">
    <div class="topbar" style="position:static;">
      <button class="icon-btn" id="listingsBackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 style="font-size:17px;">My Listings</h2>
    </div>
    <div class="view-pad" id="listingsContent"></div>
  </div>

  <!-- ============ PRODUCT DETAIL SHEET (overlay) ============ -->
  <div id="productSheetOverlay" class="sheet-overlay hidden">
    <div class="sheet" style="position:relative;">
      <button class="sheet-close" id="closeProductSheet">✕</button>
      <div id="productSheetContent"></div>
    </div>
  </div>

  <!-- ============ BOTTOM TAB BAR ============ -->
  <div class="tabbar">
    <button class="tab active" data-tab="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1Z"/></svg>
      Home
    </button>
    <button class="tab" data-tab="cart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Cart
      <span class="badge hidden" id="tabCartBadge">0</span>
    </button>
    <button class="tab" data-tab="sell">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>
      Sell
    </button>
    <button class="tab" data-tab="account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      Account
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Firebase (compat build — simplest for plain JS) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
